name: Setup Server

on:
  workflow_call:  # Definisci che il workflow può essere richiamato
    inputs:
      host:
        description: "Host IP Address"
        required: true
      username:
        description: "Username for SSH"
        required: true
      private_key:
        description: "Private key for SSH access"
        required: true

jobs:
  setup-server:
    runs-on: ubuntu-latest

    steps:
      - name: Upgrade server and install Docker & Nginx
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ inputs.host }}
          username: ${{ inputs.username }}
          key: ${{ inputs.private_key }}
          script: |
            sudo apt update -y
            sudo apt upgrade -y
            # Add Docker's official GPG key:
            sudo apt-get update
            sudo apt-get install ca-certificates curl
            sudo install -m 0755 -d /etc/apt/keyrings
            sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            sudo chmod a+r /etc/apt/keyrings/docker.asc

            # Add the repository to Apt sources:
            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
              $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
              sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update -y

            sudo apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose docker-compose-plugin -y
            sudo apt install nginx curl -y
